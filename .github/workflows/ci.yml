name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXTAUTH_SECRET: ci-nextauth-secret
      DATABASE_URL: postgresql://ci:ci@localhost:5432/farmflow
      DATABASE_URL_DEV: postgresql://ci:ci@localhost:5432/farmflow
      CRON_SECRET: ci-cron-secret
      LOG_INGEST_TOKEN: ci-log-ingest-token
      NEXT_PUBLIC_POSTHOG_KEY: phc_ci_key
      NEXT_PUBLIC_POSTHOG_HOST: https://us.i.posthog.com
      E2E_EXPECT_OWNER: "0"
      E2E_EXPECT_ADMIN: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Unit tests
        run: pnpm test

      - name: Build
        run: pnpm build

      - name: Install Playwright browser
        run: pnpm exec playwright install --with-deps chromium

      - name: Public E2E
        run: pnpm test:e2e:public
